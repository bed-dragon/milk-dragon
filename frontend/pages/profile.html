<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习养成计划 — 个人中心</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar"></aside>

  <!-- 主区域 -->
  <div class="main-wrapper">
    <header class="topbar">
      <h1 class="topbar-title">个人中心</h1>
      <div class="topbar-right">
        <span class="topbar-date" id="currentDate"></span>
      </div>
    </header>

    <main class="content">
      <!-- 个人信息展示 -->
      <div class="card profile-card">
        <div class="profile-header">
          <div class="profile-avatar-large" id="profileAvatar">👤</div>
          <div class="profile-info-text">
            <div class="profile-name" id="profileName">加载中...</div>
            <div class="profile-meta" id="profileMeta"></div>
          </div>
        </div>

        <div class="profile-section">
          <h3>📝 编辑个人资料</h3>
          <form id="profileForm" onsubmit="handleProfileUpdate(event)">
            <div class="form-group">
              <label class="form-label">用户名</label>
              <input class="form-input" type="text" id="dispUsername" disabled style="opacity:0.6;">
            </div>
            <div class="form-group">
              <label class="form-label" for="editNickname">昵称</label>
              <input class="form-input" type="text" id="editNickname" placeholder="给自己起个好听的名字" maxlength="90">
              <span class="char-count" id="nicknameCount"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="editSignature">个性签名</label>
              <input class="form-input" type="text" id="editSignature" placeholder="写一句话介绍自己..." maxlength="100">
              <span class="char-count" id="sigCount"></span>
            </div>
            <button type="submit" class="btn btn-primary" id="saveProfileBtn">保存修改</button>
          </form>
        </div>

        <div class="profile-section">
          <h3>🔒 修改密码</h3>
          <form id="passwordForm" onsubmit="handlePasswordChange(event)">
            <div class="form-group">
              <label class="form-label" for="oldPassword">旧密码</label>
              <input class="form-input" type="password" id="oldPassword" placeholder="请输入旧密码" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="newPassword">新密码</label>
              <input class="form-input" type="password" id="newPassword" placeholder="至少 6 位" required minlength="6">
            </div>
            <div class="form-group">
              <label class="form-label" for="confirmPassword">确认新密码</label>
              <input class="form-input" type="password" id="confirmPassword" placeholder="再次输入新密码" required>
            </div>
            <button type="submit" class="btn btn-outline" id="changePwdBtn">修改密码</button>
          </form>
        </div>

        <div class="profile-section">
          <button class="btn btn-danger" onclick="Auth.logout()">🚪 退出登录</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script>
    Auth.guard();
    Auth.renderSidebar('profile');
    document.getElementById('currentDate').textContent = today();

    let currentUser = null;

    // 加载用户信息
    async function loadProfile() {
      try {
        const me = await getMe();
        if (me.ok && me.data) {
          currentUser = me.data;
          renderProfile(currentUser);
          // 同步更新 localStorage
          Auth.set(Auth.getToken(), currentUser);
        }
      } catch (e) {
        // 降级到 localStorage 数据
        currentUser = Auth.getUser();
        if (currentUser) renderProfile(currentUser);
      }
    }

    function renderProfile(user) {
      const initial = (user.nickname || user.username || '?')[0].toUpperCase();
      document.getElementById('profileAvatar').textContent = initial;
      document.getElementById('profileName').textContent = user.nickname || user.username || '未设置';
      document.getElementById('profileMeta').textContent =
        '注册时间：' + (user.created_at || '未知') + '  |  用户名：' + (user.username || '-');
      document.getElementById('dispUsername').value = user.username || '';
      document.getElementById('editNickname').value = user.nickname || '';
      document.getElementById('editSignature').value = user.signature || '';
    }

    // 更新个人资料
    async function handleProfileUpdate(e) {
      e.preventDefault();
      const nickname = document.getElementById('editNickname').value.trim();
      const signature = document.getElementById('editSignature').value.trim();

      if (nickname.length > 90) {
        showToast('昵称最多90个字符', 'warning');
        return;
      }
      if (signature.length > 100) {
        showToast('签名最多100个字符', 'warning');
        return;
      }

      const btn = document.getElementById('saveProfileBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        const result = await updateProfile(nickname, signature);
        if (result.ok) {
          showToast('个人资料已更新！', 'success');
          loadProfile();
        } else {
          showToast(result.msg || '更新失败', 'error');
        }
      } catch (err) {
        // Mock 模式：本地更新
        if (currentUser) {
          currentUser.nickname = nickname;
          currentUser.signature = signature;
          Auth.set(Auth.getToken(), currentUser);
          renderProfile(currentUser);
        }
        showToast('个人资料已更新！（模拟）', 'success');
      } finally {
        btn.disabled = false;
        btn.textContent = '保存修改';
      }
    }

    // 修改密码
    async function handlePasswordChange(e) {
      e.preventDefault();
      const oldPwd = document.getElementById('oldPassword').value;
      const newPwd = document.getElementById('newPassword').value;
      const confirmPwd = document.getElementById('confirmPassword').value;

      if (newPwd.length < 6) {
        showToast('新密码至少 6 位', 'warning');
        return;
      }
      if (newPwd !== confirmPwd) {
        showToast('两次密码输入不一致', 'warning');
        return;
      }

      const btn = document.getElementById('changePwdBtn');
      btn.disabled = true;
      btn.textContent = '修改中...';

      try {
        const result = await changePassword(oldPwd, newPwd);
        if (result.ok) {
          showToast('密码已修改！', 'success');
          document.getElementById('passwordForm').reset();
        } else {
          showToast(result.msg || '密码修改失败', 'error');
        }
      } catch (err) {
        showToast(err.message || '修改失败', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '修改密码';
      }
    }

    loadProfile();

    // 初始化字数计数器
    document.querySelectorAll('input[maxlength], textarea[maxlength]').forEach(input => {
      const counter = input.parentElement.querySelector('.char-count');
      if (!counter) return;
      const max = input.maxLength;
      const update = () => {
        const len = input.value.length;
        counter.textContent = `${len}/${max}`;
        counter.classList.toggle('over', len > max * 0.9);
      };
      input.addEventListener('input', update);
      update();
    });
  </script>
</body>
</html>
