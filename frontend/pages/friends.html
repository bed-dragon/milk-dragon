<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习养成计划 — 好友</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar"></aside>

  <!-- 主区域 -->
  <div class="main-wrapper">
    <header class="topbar">
      <h1 class="topbar-title">好友</h1>
      <div class="topbar-right">
        <span class="topbar-date" id="currentDate"></span>
      </div>
    </header>

    <main class="content">
      <!-- 搜索用户 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">🔍 搜索用户</h2>
        </div>
        <div class="search-box">
          <input class="form-input" type="text" id="searchInput" placeholder="输入用户名搜索..." onkeydown="if(event.key==='Enter')search()">
          <button class="btn btn-primary" onclick="search()">搜索</button>
        </div>
        <div id="searchResults"></div>
      </div>

      <!-- 标签页切换 -->
      <div class="card">
        <div class="tabs">
          <button class="tab-item active" onclick="switchTab('friends')" data-tab="friends">👥 好友列表</button>
          <button class="tab-item" onclick="switchTab('requests')" data-tab="requests" id="requestsTab">📩 好友请求</button>
        </div>

        <!-- 好友列表 -->
        <div id="tabFriends">
          <div id="friendList" class="friend-list">
            <div class="empty-state">
              <div class="empty-icon">👥</div>
              <p>加载中...</p>
            </div>
          </div>
        </div>

        <!-- 好友请求 -->
        <div id="tabRequests" style="display:none;">
          <div id="requestList" class="friend-list">
            <div class="empty-state">
              <div class="empty-icon">📩</div>
              <p>暂无待处理的好友请求</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    Auth.guard();
    Auth.renderSidebar('friends');
    document.getElementById('currentDate').textContent = today();

    let currentTab = 'friends';
    let allFriends = [];

    // ── 标签页切换 ──
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-item').forEach(b => {
        b.className = 'tab-item' + (b.dataset.tab === tab ? ' active' : '');
      });
      document.getElementById('tabFriends').style.display = tab === 'friends' ? '' : 'none';
      document.getElementById('tabRequests').style.display = tab === 'requests' ? '' : 'none';
    }

    // ── 搜索用户 ──
    async function search() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) { showToast('请输入搜索关键词', 'warning'); return; }

      const container = document.getElementById('searchResults');
      container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><span>搜索中...</span></div>';

      try {
        const users = await searchUsers(q);
        if (!users.length) {
          container.innerHTML = '<div class="empty-state"><p>未找到匹配的用户</p></div>';
          return;
        }

        // 过滤掉自己
        const me = Auth.getUser();
        const others = users.filter(u => u.id !== (me ? me.id : -1));

        if (!others.length) {
          container.innerHTML = '<div class="empty-state"><p>未找到其他用户</p></div>';
          return;
        }

        container.innerHTML = others.map(u => `
          <div class="search-result-item">
            <div style="display:flex;align-items:center;gap:12px;">
              <div class="friend-avatar">${(u.nickname || u.username || '?')[0].toUpperCase()}</div>
              <div>
                <strong>${u.nickname || u.username}</strong>
                <span style="color:var(--text-muted);font-size:var(--font-size-sm);margin-left:6px;">@${u.username}</span>
              </div>
            </div>
            <button class="btn btn-sm btn-primary" onclick="addFriend(${u.id}, this)">+ 添加好友</button>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state"><p>搜索失败：' + e.message + '</p></div>';
      }
    }

    // ── 添加好友 ──
    async function addFriend(toId, btn) {
      btn.disabled = true;
      btn.textContent = '发送中...';
      try {
        const result = await sendFriendRequest(toId);
        if (result.ok) {
          showToast('好友申请已发送！', 'success');
          btn.textContent = '已发送';
          btn.className = 'btn btn-sm btn-outline';
        } else {
          showToast(result.error || '发送失败', 'error');
          btn.disabled = false;
          btn.textContent = '+ 添加好友';
        }
      } catch (e) {
        showToast('好友申请已发送！（模拟）', 'success');
        btn.textContent = '已发送';
        btn.className = 'btn btn-sm btn-outline';
      }
    }

    // ── 加载好友列表 ──
    async function loadFriends() {
      try {
        allFriends = await getFriendList();
        renderFriends();
        renderRequests();
      } catch (e) {
        renderFriends();
        renderRequests();
      }
    }

    function renderFriends() {
      const container = document.getElementById('friendList');
      const accepted = allFriends.filter(f => f.status === 1);

      if (!accepted.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><p>还没有好友，快去搜索添加吧！</p></div>';
        return;
      }

      container.innerHTML = accepted.map(f => `
        <div class="friend-item">
          <div class="friend-item-left">
            <div class="friend-avatar">${(f.other_nick || f.other_name || '?')[0].toUpperCase()}</div>
            <div class="friend-info">
              <div class="friend-name">${f.other_nick || f.other_name}</div>
              <div class="friend-sign">${f.other_sign || '这个人很懒，什么都没写~'}</div>
            </div>
          </div>
          <div class="friend-actions">
            <a class="btn btn-sm btn-outline" href="chat.html?friend=${f.other_id}&name=${encodeURIComponent(f.other_nick || f.other_name)}">💬 聊天</a>
            <button class="btn btn-sm btn-danger" onclick="removeFriend(${f.id}, this)">删除</button>
          </div>
        </div>
      `).join('');
    }

    function renderRequests() {
      const container = document.getElementById('requestList');
      // 待处理：对方发的申请且 status=0
      const me = Auth.getUser();
      const myId = me ? me.id : -1;
      const pending = allFriends.filter(f => f.status === 0 && f.to_id === myId);

      // 更新 tab 上的数字
      document.getElementById('requestsTab').innerHTML = '📩 好友请求' + (pending.length ? ' <span class="badge">' + pending.length + '</span>' : '');

      if (!pending.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📩</div><p>暂无待处理的好友请求</p></div>';
        return;
      }

      container.innerHTML = pending.map(f => `
        <div class="friend-item">
          <div class="friend-item-left">
            <div class="friend-avatar">${(f.other_nick || f.other_name || '?')[0].toUpperCase()}</div>
            <div class="friend-info">
              <div class="friend-name">${f.other_nick || f.other_name}</div>
              <div class="friend-sign">${f.status_text || ''}</div>
            </div>
          </div>
          <div class="friend-actions">
            <button class="btn btn-sm btn-success" onclick="handleReq(${f.id}, 1, this)">接受</button>
            <button class="btn btn-sm btn-outline" onclick="handleReq(${f.id}, 2, this)">拒绝</button>
          </div>
        </div>
      `).join('');
    }

    // ── 处理好友申请 ──
    async function handleReq(friendshipId, action, btn) {
      btn.disabled = true;
      try {
        const result = await handleFriendRequest(friendshipId, action);
        if (result.ok) {
          showToast(action === 1 ? '已接受好友申请！' : '已拒绝好友申请', 'success');
          loadFriends();
        } else {
          showToast(result.error || '操作失败', 'error');
          btn.disabled = false;
        }
      } catch (e) {
        showToast(action === 1 ? '已接受！（模拟）' : '已拒绝！（模拟）', 'success');
        // 从本地移除
        allFriends = allFriends.filter(f => f.id !== friendshipId);
        renderRequests();
      }
    }

    // ── 删除好友 ──
    async function removeFriend(friendshipId, btn) {
      const confirmed = await showConfirm('确定要删除这位好友吗？');
      if (!confirmed) return;
      btn.disabled = true;
      try {
        const result = await deleteFriend(friendshipId);
        if (result.ok) {
          showToast('已删除好友', 'success');
          allFriends = allFriends.filter(f => f.id !== friendshipId);
          renderFriends();
        } else {
          showToast(result.error || '删除失败', 'error');
          btn.disabled = false;
        }
      } catch (e) {
        showToast('已删除！（模拟）', 'success');
        allFriends = allFriends.filter(f => f.id !== friendshipId);
        renderFriends();
      }
    }

    loadFriends();
  </script>
</body>
</html>
