<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习养成计划 — 提醒中心</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">📚</span>
      <span>学习养成计划</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="../index.html">
        <span class="nav-icon">📊</span>
        <span class="nav-label">仪表盘</span>
      </a>
      <a class="nav-item" href="tasks.html">
        <span class="nav-icon">📋</span>
        <span class="nav-label">任务管理</span>
      </a>
      <a class="nav-item" href="checkin.html">
        <span class="nav-icon">✅</span>
        <span class="nav-label">打卡</span>
      </a>
      <a class="nav-item" href="stats.html">
        <span class="nav-icon">📈</span>
        <span class="nav-label">数据分析</span>
      </a>
      <a class="nav-item active" href="reminders.html">
        <span class="nav-icon">🔔</span>
        <span class="nav-label">提醒中心</span>
      </a>
      <a class="nav-item" href="pomodoro.html">
        <span class="nav-icon">🍅</span>
        <span class="nav-label">番茄钟</span>
      </a>
    </nav>
    <div class="sidebar-user" id="sidebarUserArea">
      <span class="sidebar-user-name">未登录</span>
    </div>
  </aside>

  <!-- 主区域 -->
  <div class="main-wrapper">
    <header class="topbar">
      <h1 class="topbar-title">提醒中心</h1>
      <div class="topbar-right">
        <button class="btn btn-outline btn-sm" onclick="loadReminders()">🔄 刷新</button>
        <span class="topbar-date" id="currentDate"></span>
      </div>
    </header>

    <main class="content">
      <!-- 筛选标签 -->
      <div class="card">
        <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;">
          <button class="btn btn-sm btn-primary" onclick="filterReminders('all')" data-filter="all">全部</button>
          <button class="btn btn-sm btn-outline" onclick="filterReminders('due')" data-filter="due">⏰ 到期提醒</button>
          <button class="btn btn-sm btn-outline" onclick="filterReminders('review')" data-filter="review">📖 复习提醒</button>
        </div>
      </div>

      <!-- 到期提醒 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">⏰ 到期提醒</h2>
        </div>
        <div id="dueReminders">
          <div class="empty-state">
            <div class="empty-icon">🎉</div>
            <p>没有即将到期的任务，继续保持！</p>
          </div>
        </div>
      </div>

      <!-- 复习提醒 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📖 复习提醒</h2>
        </div>
        <div id="reviewReminders">
          <div class="empty-state">
            <div class="empty-icon">📚</div>
            <p>没有需要复习的任务</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    Auth.guard();
    Auth.renderSidebarUser();
    let currentFilter = 'all';

    document.getElementById('currentDate').textContent = today();

    async function loadReminders() {
      try {
        const [dueData, reviewData] = await Promise.all([
          getReminders('due'),
          getReminders('review')
        ]);
        renderReminders('due', dueData.reminders || []);
        renderReminders('review', reviewData.reminders || []);
      } catch (e) {
        renderReminders('due', MOCK.reminders.due);
        renderReminders('review', MOCK.reminders.review);
      }
    }

    function renderReminders(type, reminders) {
      const container = document.getElementById(type === 'due' ? 'dueReminders' : 'reviewReminders');
      if (!reminders.length) {
        container.innerHTML = `<div class="empty-state">
          <div class="empty-icon">${type === 'due' ? '🎉' : '📚'}</div>
          <p>${type === 'due' ? '没有即将到期的任务，继续保持！' : '没有需要复习的任务'}</p>
        </div>`;
        return;
      }

      const filterFn = currentFilter === 'all' ? () => true : r => r.type === currentFilter;
      const filtered = reminders.filter(filterFn);

      if (!filtered.length) {
        container.innerHTML = `<div class="empty-state"><p>没有符合条件的提醒</p></div>`;
        return;
      }

      container.innerHTML = filtered.map(r => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);${r.is_read ? 'opacity:0.5;' : ''}">
          <div style="display:flex;align-items:center;gap:var(--space-sm);">
            <span style="font-size:18px;">${type === 'due' ? '⏰' : '📖'}</span>
            <div>
              <strong>${r.task_title}</strong>
              <div style="font-size:var(--font-size-sm);color:var(--text-secondary);margin-top:2px;">
                <span class="tag ${urgencyClass(r.urgency)}">${urgencyLabel(r.urgency)}</span>
                <span style="margin-left:8px;">${r.remind_date || r.date || ''}</span>
              </div>
            </div>
          </div>
          <div>
            ${r.is_read
              ? '<span style="color:var(--text-muted);font-size:var(--font-size-sm);">已读</span>'
              : `<button class="btn btn-sm btn-outline" onclick="markRead(${r.id})">标记已读</button>`
            }
          </div>
        </div>
      `).join('');
    }

    function filterReminders(type) {
      currentFilter = type;
      document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.className = `btn btn-sm ${btn.dataset.filter === type ? 'btn-primary' : 'btn-outline'}`;
      });
      loadReminders();
    }

    async function markRead(id) {
      try {
        await markReminderRead(id);
        showToast('已标记为已读', 'success');
        loadReminders();
      } catch (e) {
        showToast('标记已读成功（模拟）', 'success');
        // 模拟操作
        MOCK.reminders.due = MOCK.reminders.due.map(r => r.id === id ? {...r, is_read: 1} : r);
        MOCK.reminders.review = MOCK.reminders.review.map(r => r.id === id ? {...r, is_read: 1} : r);
        loadReminders();
      }
    }

    loadReminders();
  </script>
</body>
</html>
