<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习养成计划 — 学习资料</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar"></aside>

  <!-- 主区域 -->
  <div class="main-wrapper">
    <header class="topbar">
      <h1 class="topbar-title">学习资料</h1>
      <div class="topbar-right">
        <span class="topbar-date" id="currentDate"></span>
      </div>
    </header>

    <main class="content">
      <!-- 添加资料 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">➕ 添加学习资料</h2>
        </div>
        <form id="materialForm" onsubmit="handleAdd(event)">
          <div style="display:flex;gap:var(--space-md);flex-wrap:wrap;">
            <div class="form-group flex-1" style="min-width:200px;">
              <label class="form-label" for="matTitle">标题</label>
              <input class="form-input" type="text" id="matTitle" placeholder="资料名称..." required>
            </div>
            <div class="form-group flex-1" style="min-width:300px;">
              <label class="form-label" for="matUrl">链接</label>
              <input class="form-input" type="url" id="matUrl" placeholder="https://..." required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="addBtn">添加收藏</button>
        </form>
      </div>

      <!-- 收藏列表 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📚 我的收藏</h2>
          <button class="btn btn-outline btn-sm" onclick="loadMaterials()">🔄 刷新</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>标题</th>
                <th>链接</th>
                <th>收藏时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="materialList">
              <tr>
                <td colspan="4" style="text-align:center;color:var(--text-muted);">
                  加载中...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    Auth.guard();
    Auth.renderSidebar('materials');
    document.getElementById('currentDate').textContent = today();

    // 加载资料列表
    async function loadMaterials() {
      const tbody = document.getElementById('materialList');
      try {
        const materials = await getMaterials();
        if (!materials.length) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">暂无收藏资料，快去添加吧！</td></tr>';
          return;
        }
        tbody.innerHTML = materials.map(m => `
          <tr>
            <td><strong>${m.title}</strong></td>
            <td><a href="${m.url}" target="_blank" rel="noopener">${m.url.length > 40 ? m.url.substring(0, 40) + '...' : m.url}</a></td>
            <td>${m.created_at || '-'}</td>
            <td>
              <a class="btn btn-sm btn-outline" href="${m.url}" target="_blank" rel="noopener">打开</a>
              <button class="btn btn-sm btn-danger" onclick="removeMaterial(${m.id}, this)">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">暂无收藏资料</td></tr>';
      }
    }

    // 添加资料
    async function handleAdd(e) {
      e.preventDefault();
      const title = document.getElementById('matTitle').value.trim();
      const url = document.getElementById('matUrl').value.trim();

      if (!title || !url) {
        showToast('请填写标题和链接', 'warning');
        return;
      }

      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      btn.textContent = '添加中...';

      try {
        const result = await addMaterial(title, url);
        if (result.ok) {
          showToast('资料已收藏！', 'success');
          document.getElementById('materialForm').reset();
          loadMaterials();
        } else {
          showToast(result.error || '添加失败', 'error');
        }
      } catch (e) {
        showToast('资料已收藏！（模拟）', 'success');
        document.getElementById('materialForm').reset();
        loadMaterials();
      } finally {
        btn.disabled = false;
        btn.textContent = '添加收藏';
      }
    }

    // 删除资料
    async function removeMaterial(id, btn) {
      const confirmed = await showConfirm('确定要删除这条收藏吗？');
      if (!confirmed) return;
      btn.disabled = true;
      try {
        const result = await deleteMaterial(id);
        if (result.ok) {
          showToast('已删除', 'success');
          loadMaterials();
        } else {
          showToast(result.error || '删除失败', 'error');
          btn.disabled = false;
        }
      } catch (e) {
        showToast('已删除！（模拟）', 'success');
        loadMaterials();
      }
    }

    loadMaterials();
  </script>
</body>
</html>
