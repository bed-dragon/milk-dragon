<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习养成计划 — 聊天</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar"></aside>

  <!-- 主区域 -->
  <div class="main-wrapper">
    <header class="topbar">
      <h1 class="topbar-title" id="chatTitle">💬 聊天</h1>
      <div class="topbar-right">
        <button class="btn btn-outline btn-sm" onclick="refreshMessages()">🔄 刷新</button>
        <span class="topbar-date" id="currentDate"></span>
      </div>
    </header>

    <main class="content">
      <div class="two-col">
        <!-- 左侧：好友列表 -->
        <div class="two-col-side">
          <div style="padding:var(--space-md);border-bottom:1px solid var(--border);font-weight:600;font-size:var(--font-size-sm);color:var(--text-secondary);">
            好友列表
          </div>
          <div id="chatFriendList" class="friend-list" style="overflow-y:auto;">
            <div class="empty-state" style="padding:12px;">
              <p style="font-size:var(--font-size-sm);">加载中...</p>
            </div>
          </div>
        </div>

        <!-- 右侧：聊天窗口 -->
        <div class="two-col-main">
          <div id="chatPlaceholder" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);">
            <div class="empty-state">
              <div class="empty-icon">💬</div>
              <p>选择一位好友开始聊天</p>
            </div>
          </div>
          <div id="chatArea" style="display:none;flex:1;flex-direction:column;height:100%;">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
              <div style="flex:1;">
                <input class="form-input" type="text" id="msgInput" placeholder="输入消息..." maxlength="3000" onkeydown="if(event.key==='Enter')send()">
                <span class="char-count" id="msgCount" style="text-align:left;padding-left:4px;"></span>
              </div>
              <button class="btn btn-primary" onclick="send()" id="sendBtn">发送</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/navigation.js"></script>
  <script>
    Auth.guard();
    Auth.renderSidebar('chat');
    document.getElementById('currentDate').textContent = today();

    let activeFriendId = null;
    let activeFriendName = '';

    // 从 URL 参数读取预设好友
    const params = new URLSearchParams(window.location.search);
    const presetFriendId = params.get('friend');
    const presetFriendName = params.get('name');

    // 加载好友列表 + 每个好友的未读数
    async function loadChatFriends() {
      const container = document.getElementById('chatFriendList');
      try {
        const friends = await getFriendList();
        const accepted = friends.filter(f => f.status === 1);
        if (!accepted.length) {
          container.innerHTML = '<div class="empty-state" style="padding:12px;"><p style="font-size:var(--font-size-sm);">暂无好友，先去添加吧</p></div>';
          return;
        }

        // 并行查询每个好友的未读数
        const unreadMap = {};
        let totalUnread = 0;
        await Promise.all(accepted.map(async f => {
          try {
            const c = await getUnreadCount(f.other_id);
            if (c > 0) { unreadMap[f.other_id] = c; totalUnread += c; }
          } catch(e) {}
        }));

        // 标题红色徽章
        const badge = totalUnread > 0 ? ` <span style="background:var(--danger);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;margin-left:4px;">${totalUnread}</span>` : '';
        document.getElementById('chatTitle').innerHTML = '💬 聊天' + badge;

        container.innerHTML = accepted.map(f => {
          const fid = f.other_id;
          const name = f.other_nick || f.other_name;
          const uc = unreadMap[fid] || 0;
          return `
          <div class="friend-item${fid == presetFriendId ? ' active' : ''}" onclick="selectFriend(${fid}, '${name.replace(/'/g, "\\'")}')" data-fid="${fid}">
            <div class="friend-item-left">
              <div class="friend-avatar">${(name || '?')[0].toUpperCase()}</div>
              <div class="friend-info">
                <div class="friend-name">${name}</div>
              </div>
            </div>
            ${uc > 0 ? `<span class="frd-unread" style="background:var(--danger);color:#fff;font-size:11px;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;">${uc}</span>` : ''}
          </div>
        `}).join('');

        // 仅在首次加载时自动选中URL预设好友，之后刷新不再跳转
        if (presetFriendId && !window._presetDone) {
          window._presetDone = true;
          selectFriend(parseInt(presetFriendId), decodeURIComponent(presetFriendName));
        }
      } catch (e) {
        container.innerHTML = '<div class="empty-state" style="padding:12px;"><p style="font-size:var(--font-size-sm);">加载失败</p></div>';
      }
    }

    // 选择好友
    function selectFriend(friendId, friendName) {
      activeFriendId = friendId;
      activeFriendName = friendName;

      // 高亮
      document.querySelectorAll('#chatFriendList .friend-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.fid) === friendId);
      });

      // 显示聊天区
      document.getElementById('chatPlaceholder').style.display = 'none';
      document.getElementById('chatArea').style.display = 'flex';

      // 立即清除该好友的未读徽章（后端已经在 message_history 查询时标记已读）
      clearFriendBadge(friendId);
      // 标题显示好友名（不带旧徽章），后续 refreshUnreadOnly 会更新全局徽章
      document.getElementById('chatTitle').innerHTML = '💬 ' + friendName;
      // 高亮当前好友
      document.querySelectorAll('#chatFriendList .friend-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.fid) === friendId);
      });

      refreshMessages();
      if (window._chatTimer) clearInterval(window._chatTimer);
      // 立即刷新一次未读数
      refreshUnreadOnly();
      window._chatTimer = setInterval(() => {
        refreshMessages();
        refreshUnreadOnly();
      }, 3000);
    }

    // 清除某个好友的未读徽章
    function clearFriendBadge(fid) {
      document.querySelectorAll('#chatFriendList .friend-item').forEach(el => {
        if (parseInt(el.dataset.fid) === fid) {
          const b = el.querySelector('.frd-unread');
          if (b) b.remove();
        }
      });
    }

    // 轻量刷新好友未读徽章（不重建DOM）
    async function refreshUnreadOnly() {
      try {
        const unreadMap = {};
        let totalUnread = 0;
        const items = document.querySelectorAll('#chatFriendList .friend-item');
        const fids = Array.from(items).map(el => parseInt(el.dataset.fid)).filter(Boolean);
        await Promise.all(fids.map(async fid => {
          try { const c = await getUnreadCount(fid); if (c > 0) { unreadMap[fid] = c; totalUnread += c; } } catch(e) {}
        }));
        // 更新标题徽章
        const badge = totalUnread > 0 ? ` <span style="background:var(--danger);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;margin-left:4px;">${totalUnread}</span>` : '';
        if (activeFriendId) {
          const name = activeFriendName || '';
          document.getElementById('chatTitle').innerHTML = '💬 ' + name + badge;
        } else {
          document.getElementById('chatTitle').innerHTML = '💬 聊天' + badge;
        }
        // 更新每个好友的徽章
        items.forEach(el => {
          const fid = parseInt(el.dataset.fid);
          const uc = unreadMap[fid] || 0;
          const existing = el.querySelector('.frd-unread');
          if (existing) existing.remove();
          if (uc > 0) {
            const badgeEl = document.createElement('span');
            badgeEl.className = 'frd-unread';
            badgeEl.style.cssText = 'background:var(--danger);color:#fff;font-size:11px;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;margin-left:6px;';
            badgeEl.textContent = uc;
            const nameDiv = el.querySelector('.friend-name');
            if (nameDiv) nameDiv.appendChild(badgeEl);
          }
        });
      } catch(e) {}
    }

    // 刷新消息
    async function refreshMessages() {
      if (!activeFriendId) return;
      const container = document.getElementById('chatMessages');
      try {
        const messages = await getMessages(activeFriendId);
        if (!messages.length) {
          container.innerHTML = '<div class="empty-state"><p style="color:var(--text-muted);">还没有消息，打个招呼吧！</p></div>';
          return;
        }
        container.innerHTML = messages.map(m => {
          const isUnread = !m.mine && !m.is_read;
          const unreadStyle = isUnread ? 'background:var(--primary);color:#fff;' : '';
          const unreadClass = isUnread ? ' chat-bubble-new' : '';
          return `
          <div class="chat-bubble ${m.mine ? 'chat-bubble-self' : 'chat-bubble-friend'}${unreadClass}" style="${unreadStyle}">
            <div style="font-weight:${isUnread ? '600' : '400'}">${m.content}</div>
            <div class="chat-bubble-time">${formatTimeFull(m.created_at)} ${isUnread ? '<span class="unread-dot"></span>' : ''}</div>
          </div>
        `}).join('');
        // 滚动到底部
        container.scrollTop = container.scrollHeight;
      } catch (e) {
        container.innerHTML = '<div class="empty-state"><p style="color:var(--text-muted);">加载消息失败</p></div>';
      }
    }

    // 发送消息
    async function send() {
      if (!activeFriendId) return;
      const content = document.getElementById('msgInput').value.trim();
      if (!content) return;
      if (content.length > 3000) {
        showToast('消息内容过长（最多3000字）', 'warning');
        return;
      }

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.textContent = '发送中...';

      try {
        const result = await sendMessage(activeFriendId, content);
        if (result.ok) {
          document.getElementById('msgInput').value = '';
          refreshMessages();
          // 更新好友列表中自己的高亮状态（无额外API开销）
          document.querySelectorAll('#chatFriendList .friend-item').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.fid) === activeFriendId);
          });
        } else {
          showToast(result.error || '发送失败', 'error');
        }
      } catch (e) {
        // Mock: 追加到页面
        const container = document.getElementById('chatMessages');
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble chat-bubble-self';
        bubble.innerHTML = '<div>' + content + '</div><div class="chat-bubble-time">刚刚</div>';
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
        document.getElementById('msgInput').value = '';
        showToast('消息已发送！（模拟）', 'success');
      } finally {
        btn.disabled = false;
        btn.textContent = '发送';
      }
    }

    loadChatFriends();

    // 初始化字数计数器
    document.querySelectorAll('input[maxlength], textarea[maxlength]').forEach(input => {
      const counter = input.parentElement.querySelector('.char-count');
      if (!counter) return;
      const max = input.maxLength;
      const update = () => {
        const len = input.value.length;
        counter.textContent = `${len}/${max}`;
        counter.classList.toggle('over', len > max * 0.9);
      };
      input.addEventListener('input', update);
      update();
    });
  </script>
  <style>
    /* 聊天气泡动画 */
    .chat-bubble-new {
      animation: bounceIn 0.4s ease;
    }
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }
    .unread-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--danger);
      border-radius: 50%;
      margin-left: 4px;
      vertical-align: middle;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</body>
</html>
