<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习养成计划 — 番茄钟</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar"></aside>

  <!-- 主区域 -->
  <div class="main-wrapper">
    <header class="topbar">
      <h1 class="topbar-title">番茄钟</h1>
      <div class="topbar-right">
        <span class="topbar-date" id="currentDate"></span>
      </div>
    </header>

    <main class="content">
      <!-- 计时器 -->
      <div class="card">
        <div class="pomodoro-timer">
          <!-- 时长选择 -->
          <div style="display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;" id="durationPresets">
            <button class="btn btn-sm btn-outline" onclick="setDuration(15)" data-preset="15">15 分钟</button>
            <button class="btn btn-sm btn-primary" onclick="setDuration(25)" data-preset="25">25 分钟</button>
            <button class="btn btn-sm btn-outline" onclick="setDuration(45)" data-preset="45">45 分钟</button>
            <button class="btn btn-sm btn-outline" onclick="setDuration(60)" data-preset="60">60 分钟</button>
            <span style="display:flex;align-items:center;gap:4px;">
              <input class="form-input" type="number" id="customDuration" value="25"
                     min="1" max="120" style="width:60px;text-align:center;padding:4px;"
                     onchange="setDuration(parseInt(this.value)||25)">
              <span style="font-size:13px;color:var(--text-muted);">分钟</span>
            </span>
          </div>

          <div class="pomodoro-clock" id="pomodoroClock">
            <span style="font-size:36px;">🍅</span>
            <span class="pomodoro-time" id="pomodoroTime">25:00</span>
            <span class="pomodoro-label" id="pomodoroStatus">准备开始</span>
          </div>
          <div class="pomodoro-controls">
            <button class="btn btn-primary btn-lg" id="btnStart" onclick="startTimer()">▶ 开始</button>
            <button class="btn btn-outline btn-lg" id="btnPause" onclick="pauseTimer()" style="display:none;">⏸ 暂停</button>
            <button class="btn btn-outline btn-lg" id="btnReset" onclick="resetTimer()">🔄 重置</button>
          </div>
        </div>
      </div>

      <!-- 今日统计 -->
      <div class="stat-grid" id="pomodoroStats">
        <div class="stat-card">
          <div class="stat-icon">🍅</div>
          <div class="stat-value" id="statCount">0</div>
          <div class="stat-label">今日番茄数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⏱️</div>
          <div class="stat-value" id="statMinutes">0 min</div>
          <div class="stat-label">总专注时长</div>
        </div>
      </div>

      <!-- 今日记录 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📋 今日番茄记录</h2>
          <button class="btn btn-outline btn-sm" onclick="loadTodayRecords()">🔄 刷新</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>序号</th>
                <th>开始时间</th>
                <th>时长（分钟）</th>
              </tr>
            </thead>
            <tbody id="pomodoroRecords">
              <tr>
                <td colspan="3" style="text-align:center;color:var(--text-muted);">
                  暂无记录，开始你的第一个番茄钟吧！
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script>
    Auth.guard();
    Auth.renderSidebar('pomodoro');

    const LS_KEY = 'pomodoro_state';  // localStorage 键名

    // 计时器状态
    let currentMinutes = 25;
    let totalSeconds = currentMinutes * 60;
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let isRunning = false;

    // DOM 引用
    const timeEl = document.getElementById('pomodoroTime');
    const statusEl = document.getElementById('pomodoroStatus');
    const clockEl = document.getElementById('pomodoroClock');
    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnReset = document.getElementById('btnReset');

    document.getElementById('currentDate').textContent = today();
    loadTodayRecords();

    // ── localStorage 持久化 ──

    function saveState() {
      localStorage.setItem(LS_KEY, JSON.stringify({
        endTime: Date.now() + remainingSeconds * 1000,
        totalSeconds: totalSeconds,
        currentMinutes: currentMinutes
      }));
    }

    function clearState() {
      localStorage.removeItem(LS_KEY);
    }

    function restoreState() {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return false;
      try {
        const state = JSON.parse(raw);
        const elapsed = Math.floor((state.endTime - Date.now()) / 1000);
        if (elapsed <= 0) {
          // 已经超时了，直接触发完成
          currentMinutes = state.currentMinutes;
          totalSeconds = state.totalSeconds;
          remainingSeconds = totalSeconds;
          clearState();
          onTimerComplete();
          return true;
        }
        // 还在计时中，恢复
        currentMinutes = state.currentMinutes;
        totalSeconds = state.totalSeconds;
        remainingSeconds = elapsed;
        document.getElementById('customDuration').value = currentMinutes;
        highlightPreset(currentMinutes);
        resumeTimer();
        return true;
      } catch (e) {
        clearState();
        return false;
      }
    }

    // ── 自定义时长 ──

    function setDuration(minutes) {
      if (isRunning) return;
      minutes = Math.max(1, Math.min(120, parseInt(minutes) || 25));
      currentMinutes = minutes;
      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      document.getElementById('customDuration').value = minutes;
      highlightPreset(minutes);
      clearState();
      updateDisplay();
    }

    function highlightPreset(minutes) {
      document.querySelectorAll('[data-preset]').forEach(btn => {
        const isActive = parseInt(btn.dataset.preset) === minutes;
        btn.className = 'btn btn-sm ' + (isActive ? 'btn-primary' : 'btn-outline');
      });
    }

    // ── 计时器逻辑 ──

    function formatTime(seconds) {
      const m = Math.floor(Math.max(0, seconds) / 60);
      const s = Math.max(0, seconds) % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function updateDisplay() {
      timeEl.textContent = formatTime(remainingSeconds);
      const ratio = remainingSeconds / totalSeconds;
      if (ratio < 0.2) clockEl.style.borderColor = 'var(--danger)';
      else if (ratio < 0.5) clockEl.style.borderColor = 'var(--warning)';
      else clockEl.style.borderColor = 'var(--primary)';
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      btnStart.style.display = 'none';
      btnPause.style.display = 'inline-flex';
      setRunningUI();

      saveState();
      tickLoop();
    }

    function resumeTimer() {
      // 从 localStorage 恢复后直接开始跑
      isRunning = true;
      btnStart.style.display = 'none';
      btnPause.style.display = 'inline-flex';
      setRunningUI();
      saveState();
      tickLoop();
    }

    function setRunningUI() {
      statusEl.textContent = '专注中...';
      clockEl.style.borderColor = 'var(--primary)';
      updateDisplay();
    }

    function tickLoop() {
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        remainingSeconds--;
        updateDisplay();
        // 每秒刷一次 localStorage（关闭页面后也能算准，误差 <1s）
        if (remainingSeconds % 5 === 0) saveState();

        if (remainingSeconds <= 0) {
          clearInterval(timerId);
          timerId = null;
          isRunning = false;
          remainingSeconds = totalSeconds;
          clearState();
          onTimerComplete();
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
      clearState();
      statusEl.textContent = '已暂停';
      btnPause.style.display = 'none';
      btnStart.style.display = 'inline-flex';
      btnStart.textContent = '▶ 继续';
    }

    function resetTimer() {
      if (timerId) { clearInterval(timerId); timerId = null; }
      isRunning = false;
      clearState();
      totalSeconds = currentMinutes * 60;
      remainingSeconds = totalSeconds;
      statusEl.textContent = '准备开始';
      btnStart.style.display = 'inline-flex';
      btnStart.textContent = '▶ 开始';
      btnPause.style.display = 'none';
      clockEl.style.borderColor = 'var(--primary)';
      updateDisplay();
    }

    // ── 完成弹窗 ──

    function showCompleteModal() {
      // 移除旧弹窗
      const old = document.getElementById('pomodoroModal');
      if (old) old.remove();

      const modal = document.createElement('div');
      modal.id = 'pomodoroModal';
      modal.style.cssText = `
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.5);display:flex;align-items:center;
        justify-content:center;z-index:10000;
      `;
      modal.innerHTML = `
        <div style="background:var(--bg-card);border-radius:var(--radius-lg);
          padding:32px;text-align:center;max-width:380px;width:90%;
          box-shadow:var(--shadow-xl);animation:popIn 0.3s ease;">
          <div style="font-size:64px;margin-bottom:12px;">🎉</div>
          <h2 style="margin:0 0 8px;">番茄钟完成！</h2>
          <p style="color:var(--text-secondary);margin:0 0 20px;">
            ${currentMinutes} 分钟专注时间已记录
          </p>
          <button class="btn btn-primary" onclick="document.getElementById('pomodoroModal').remove();localStorage.removeItem('pomodoro_done');"
            style="min-width:120px;">知道了</button>
        </div>
      `;
      document.body.appendChild(modal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.remove();
      });
    }

    // ── 完成回调 ──

    async function onTimerComplete() {
      // 标记完成（其他页面检测用）
      localStorage.setItem('pomodoro_done', currentMinutes);
      statusEl.textContent = '完成！';
      btnPause.style.display = 'none';
      btnStart.style.display = 'inline-flex';
      btnStart.textContent = '▶ 开始';
      clockEl.style.borderColor = 'var(--success)';
      updateDisplay();

      // 弹窗
      showCompleteModal();

      // 浏览器通知
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('番茄钟完成 🎉', { body: currentMinutes + ' 分钟专注结束！' });
      } else if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }

      // 记录到后端
      try {
        await recordPomodoro(currentMinutes);
      } catch (e) {
        // Mock
        if (!MOCK.pomodoroToday) MOCK.pomodoroToday = [];
        MOCK.pomodoroToday.push({
          id: Date.now(), duration: currentMinutes,
          start_time: new Date().toTimeString().slice(0,5), date: today()
        });
      }
      loadTodayRecords();
    }

    // ── 今日记录 ──

    async function loadTodayRecords() {
      try {
        const data = await getTodayPomodoros();
        renderRecords(data.records || []);
      } catch (e) {
        renderRecords(MOCK.pomodoroToday || []);
      }
    }

    function renderRecords(records) {
      const tbody = document.getElementById('pomodoroRecords');
      const count = records.length;
      const totalMin = records.reduce((sum, r) => sum + (r.duration || 0), 0);
      document.getElementById('statCount').textContent = count;
      document.getElementById('statMinutes').textContent = totalMin + ' min';

      if (!records.length) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">暂无记录，开始你的第一个番茄钟吧！</td></tr>';
        return;
      }
      tbody.innerHTML = records.map((r, i) => `
        <tr><td>${i + 1}</td><td>${r.start_time || '-'}</td><td>${r.duration || '-'} 分钟</td></tr>
      `).join('');
    }

    // ── 初始化：恢复未完成的计时器 ──
    if (!restoreState()) {
      updateDisplay();
    }

    // ── 弹窗动画 ──
    const animStyle = document.createElement('style');
    animStyle.textContent = '@keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }';
    document.head.appendChild(animStyle);
  </script>
</body>
</html>
